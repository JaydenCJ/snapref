<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real snapref session (output copied verbatim
       from examples/agent-loop.sh, v0.1.0, SNAPREF_TIME-pinned so the same
       ids reproduce on any machine). -->
  <rect width="1060" height="560" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">snapref — which turn wrote this line?</text>

  <g fill="#adbac7" xml:space="preserve">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> snapref log</text>
    <text x="24" y="92"><tspan fill="#e0b543">turn 3</tspan>  <tspan fill="#96d0ff">942d7ec3</tspan>  <tspan fill="#768390">2026-07-12T10:02:28Z</tspan>  +0 ~1 -0  <tspan fill="#dcbdfb">demo-agent:</tspan> build the AST</text>
    <text x="24" y="118"><tspan fill="#e0b543">turn 2</tspan>  <tspan fill="#96d0ff">21f180ea</tspan>  <tspan fill="#768390">2026-07-12T10:01:13Z</tspan>  +1 ~1 -0  <tspan fill="#dcbdfb">demo-agent:</tspan> add the lexer</text>
    <text x="24" y="144"><tspan fill="#e0b543">turn 1</tspan>  <tspan fill="#96d0ff">9b83bf13</tspan>  <tspan fill="#768390">2026-07-12T10:00:00Z</tspan>  +2 ~0 -0  <tspan fill="#dcbdfb">demo-agent:</tspan> scaffold the parser</text>

    <text x="24" y="196"><tspan fill="#6cb6ff">$</tspan> snapref blame src/parser.rs</text>
    <text x="24" y="222"><tspan fill="#e0b543">turn 1</tspan> <tspan fill="#768390">| 2026-07-12T10:00:00Z |</tspan> scaffold the parser <tspan fill="#768390">| 1 |</tspan> fn parse(input: &amp;str) -&gt; Ast {</text>
    <text x="24" y="248"><tspan fill="#e0b543">turn 2</tspan> <tspan fill="#768390">| 2026-07-12T10:01:13Z |</tspan> add the lexer       <tspan fill="#768390">| 2 |</tspan>     let toks = lex(input);</text>
    <text x="24" y="274"><tspan fill="#f47067">wt    </tspan> <tspan fill="#768390">|                      |</tspan> <tspan fill="#f47067">(not snapped)</tspan>       <tspan fill="#768390">| 3 |</tspan>     dbg!(&amp;toks);</text>
    <text x="24" y="300"><tspan fill="#e0b543">turn 3</tspan> <tspan fill="#768390">| 2026-07-12T10:02:28Z |</tspan> build the AST       <tspan fill="#768390">| 4 |</tspan>     Ast::from_tokens(toks)</text>
    <text x="24" y="326"><tspan fill="#e0b543">turn 1</tspan> <tspan fill="#768390">| 2026-07-12T10:00:00Z |</tspan> scaffold the parser <tspan fill="#768390">| 5 |</tspan> }</text>

    <text x="24" y="378"><tspan fill="#6cb6ff">$</tspan> snapref restore 1 <tspan fill="#768390"># rewind; dirty work is snapped first</tspan></text>
    <text x="24" y="404"><tspan fill="#57ab5a">working tree backed up as turn 4</tspan></text>
    <text x="24" y="430">restored working tree to turn 1 (<tspan fill="#96d0ff">9b83bf13</tspan>): 1 file(s) written, 1 deleted</text>

    <text x="24" y="482"><tspan fill="#6cb6ff">$</tspan> snapref show 4:src/parser.rs | grep dbg <tspan fill="#768390"># nothing was lost</tspan></text>
    <text x="24" y="508">    dbg!(&amp;toks);</text>
    <text x="24" y="534" fill="#768390"># every blob id doubles as a git id: try `git hash-object` on any file</text>
  </g>
</svg>
